app = "cjp-healthtech-backend"

[build]
  image = ""

[env]
  PORT = "8000"

[experimental]
  allowed_public_ports = [8000]
  auto_rollback = true

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    port = 80

  [[services.ports]]
    port = 443

  [services.tcp_checks]
    interval = 10000
    timeout = 2000
    restart_limit = 0

[[mounts]]
  source = "chroma_db"
  destination = "/app/chroma_db"
