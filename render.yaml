# Render Blueprint — deploys backend/ as a free-tier Docker web service
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: medsakhi-backend
    runtime: docker
    rootDir: backend
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    healthCheckGracePeriodSeconds: 600   # first cold start re-ingests 1100 docs + model download
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PORT
        value: 8000
      # CORS_ORIGINS is parsed by pydantic as a list. Render passes env vars as
      # strings, so use JSON-array form: ["https://your-app.vercel.app"]
      - key: CORS_ORIGINS
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: NIM_MODEL
        value: mistralai/mistral-small-4-119b-2603
      - key: NIM_VISION_MODEL
        value: mistralai/mistral-small-4-119b-2603
      - key: GOOGLE_MAPS_API_KEY
        sync: false
# NOTE: Render free tier has no persistent disk. The backend re-ingests
# data/diseases.json (100) + data/qa_pairs.json (1000) from the image on each
# cold start. First request after spin-up takes ~30-60s to embed; then it's
# instant until the service sleeps again (~15 min idle on free). Good for demos.
